<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> flores para conita 🌸</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #e6e6fa;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      text-align: center;
      position: relative;
    }

    .contenido {
      margin-top: 40px;
      padding: 0 20px;
      z-index: 2;
    }

    h1 {
      color: black;
      font-size: 2rem;
      margin: 0;
    }

    .mensaje {
      margin-top: 12px;
      color: black;
      font-size: 1.1rem;
      max-width: 500px;
      line-height: 1.4;
    }

    .flower {
      position: absolute;
      bottom: 0;
      font-size: 2rem;
      animation: grow 4s ease-out forwards;
      opacity: 0;
      z-index: 1;
    }

    @keyframes grow {
      0% {
        transform: translateY(100px) scale(0.2);
        opacity: 0;
      }
      100% {
        transform: translateY(-200px) scale(1.5);
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.6rem;
      }

      .mensaje {
        font-size: 1rem;
        max-width: 90%;
      }
    }
  </style>
</head>

<body>
  <div class="contenido">
    <h1>Estas flores son para ti bonita 🌸</h1>
    <p class="mensaje">
      Sé que quizás estás estresada por la pega, asiq espero que esto te saque una sonrisa
    </p>
  </div>

  <script>
    const flowers = ["🌸", "🌷", "🌺", "🌼", "💮"];

    function createFlower() {
      const flower = document.createElement("div");
      flower.classList.add("flower");
      flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
      flower.style.left = Math.random() * 100 + "%";

      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 4000);
    }

    setInterval(createFlower, 400);
  </script>
</body>
</html>

</body>
</html>
