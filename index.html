<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flores para conita ❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #d0bfff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      text-align: center;
      position: relative;
    }

    .zona-texto {
      margin-top: 40px;
      padding: 0 20px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      width: 100%;
      box-sizing: border-box;
    }

    .contenido {
      padding: 0 20px;
      z-index: 2;
      max-width: 520px;
    }

    h1 {
      color: white;
      font-size: 2rem;
      margin: 0;
    }

    .mensaje {
      margin-top: 12px;
      color: white;
      font-size: 1.1rem;
      line-height: 1.4;
    }

    .foto-lado {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 24px;
      border: 4px solid white;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .flower {
      position: absolute;
      bottom: 0;
      font-size: 2rem;
      animation: grow 4s ease-out forwards;
      opacity: 0;
      z-index: 1;
    }

    @keyframes grow {
      0% {
        transform: translateY(100px) scale(0.2);
        opacity: 0;
      }
      100% {
        transform: translateY(-200px) scale(1.5);
        opacity: 1;
      }
    }

    @media (max-width: 800px) {
      body {
        overflow-y: auto;
      }

      .zona-texto {
        flex-direction: column;
        gap: 15px;
      }

      .foto-lado {
        width: 180px;
        height: 180px;
      }

      h1 {
        font-size: 1.6rem;
      }

      .mensaje {
        font-size: 1rem;
      }
    }
  </style>
</head>

  <div class="zona-texto">

    <div class="contenido">

      flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
      flower.style.left = Math.random() * 100 + "%";

      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 4000);
    }
