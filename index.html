<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> flores para conita 🌸</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #e6e6fa;
      font-family: Arial, sans-serif;
    }

    h1 {
      position: absolute;
      top: 40px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 2rem;
    }

    .mensaje {
      position: absolute;
      top: 100px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 1.2rem;

      /* centrar mejor */
      max-width: 600px;
      left: 50%;
      transform: translateX(-50%);
    }

    .flower {
      position: absolute;
      bottom: 0;
      font-size: 2rem;
      animation: grow 4s ease-out forwards;
      opacity: 0;
    }

    @keyframes grow {
      0% {
        transform: translateY(100px) scale(0.2);
        opacity: 0;
      }
      100% {
        transform: translateY(-200px) scale(1.5);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <h1>Estas flores son para ti bonita 🌸</h1>

  <p class="mensaje">
    Sé que quizás estás estresada por la pega, asiq espero que esto te saque una sonrisa <3
  </p>

  <script>
    const flowers = ["🌸", "🌷", "🌺", "🌼", "💮"];

    function createFlower() {
      const flower = document.createElement("div");
      flower.classList.add("flower");
      flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
      flower.style.left = Math.random() * 100 + "%";

      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 4000);
    }

    setInterval(createFlower, 400);
  </script>

</body>
</html>
