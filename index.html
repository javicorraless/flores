<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flores para conita 🌸</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #d0bfff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      text-align: center;
      position: relative;
    }

    .contenido {
      margin-top: 40px;
      padding: 0 20px;
      z-index: 2;
    }

    h1 {
      color: white;
      font-size: 2rem;
      margin: 0;
    }

    .mensaje {
      margin-top: 12px;
      color: white;
      font-size: 1.1rem;
      max-width: 500px;
      line-height: 1.4;
    }

    .flower {
      position: absolute;
      bottom: 0;
      font-size: 2rem;
      animation: grow 4s ease-out forwards;
      opacity: 0;
      z-index: 1;
    }

    @keyframes grow {
      0% {
        transform: translateY(100px) scale(0.2);
        opacity: 0;
      }
      100% {
        transform: translateY(-200px) scale(1.5);
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.6rem;
      }

      .mensaje {
        font-size: 1rem;
        max-width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="contenido">
    <h1>Estas flores son para ti bonita 🌸</h1>
    <p class="mensaje" id="mensaje"></p>
  </div>

  <script>
    // 🌸 FLORES
    const flowers = ["🌸", "🌷", "🌺", "🌼", "💮","💗",];

    function createFlower() {
      const flower = document.createElement("div");
      flower.classList.add("flower");
      flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
      flower.style.left = Math.random() * 100 + "%";

      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 4000);
    }

    setInterval(createFlower, 400);

    // 💬 FRASES
    const frases = [
      "Que tengas un muy lindo día preciosa, espero haberte sacado una sonrisa con este detallito",
      "Te extraño conita bella, ando pensando en ti",
      "Sé que quizás estas estresada por esos excels, ánimo conita no te rindas",
      "Cada flor es un besito que le daria a tu linda carita, te echo de menos conita",
      "Te pienso todos los días, quiero verte hermosa",
      "Un mini recordatorio de que te quiero y te extraño un montón",
      "Buenos días mi solcito bello, que tengas un excelente día",
      "Espero que te guste este mini detallito muy ñoño, me encantas linda",
      "Aquí puro buen trato hermosa",
      "Sabes lo linda que te ves hoy? aunque en realidad todos los días te ves perfecta",
      "Vamos preciosa ánimo un día más es un día menos para que podamos estar juntitas de nuevo",
      "我喜欢你",
      "Que carita tan preciosa que tienes",
      "Love, it sustains you. It’s like oatmeal.",
      "Ojalá haberte traído de souvenir",
      "Quiero estar en tus brazos, siempre en tus brazos",
      "Que no daría por besarte por abrazarte una vez más, eres inolvidable",
      "Recuerdo cada momento especial contigo, hasta cuando me hiciste comer maki diciendome que era dulce",
      "Tu polerón aún huele a ti, me encanta, me encantas coni",
      "Me pone muy feliz pensar en tu sonrisa",
      "Me encanta todo de ti, tu sonrisa, tus margaritas, tus cachetitos, tus ojitos hermosos, tus lunarsitos, eres realmente preciosa",
      "Eres la ama de mi sol coni",
      "Sabía que intentarías ver todas las frases el mismo día cuando te dieras cuenta que es más de una, asiq tuve que ingeniarmelas fjdkfnsj, me encantas preciosa",
      "Ir a visitarte fue increíble, esos días contigo jamás los olvidaré, estaré esperando nuestra próxima cita",
      "Me encanta dedicarte los atardeceres, porque los colores me recuerdan a ti",
      "Para mi preciosa ladrona de copihues, te adoro"
    ];

    // 🌸 Frase diaria (cambia a las 8:00 am)
    function obtenerFraseDiaria() {
      const ahora = new Date();

      const corteHoy = new Date();
      corteHoy.setHours(8, 0, 0, 0);

      let ultimoCorte;

      if (ahora >= corteHoy) {
        ultimoCorte = corteHoy;
      } else {
        ultimoCorte = new Date(corteHoy);
        ultimoCorte.setDate(ultimoCorte.getDate() - 1);
      }

      const claveFecha = ultimoCorte.toISOString().split("T")[0];

      const fraseGuardada = localStorage.getItem("fraseDiaria");
      const fechaGuardada = localStorage.getItem("fechaFrase");

      // Mantener misma frase hasta las próximas 8 am
      if (fraseGuardada && fechaGuardada === claveFecha) {
        return fraseGuardada;
      }

      // Elegir nueva frase
      const nuevaFrase = frases[Math.floor(Math.random() * frases.length)];

      localStorage.setItem("fraseDiaria", nuevaFrase);
      localStorage.setItem("fechaFrase", claveFecha);

      return nuevaFrase;
    }

    document.getElementById("mensaje").textContent = obtenerFraseDiaria();
  </script>

</body>
</html>
